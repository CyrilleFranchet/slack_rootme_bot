display_information:
  name: Root-Me Bot
  description: Slack bot for Root-Me rankings and member lookups
  background_color: "#0F172A"

features:
  bot_user:
    display_name: Root-Me Bot
    always_online: false
  slash_commands:
    - command: /rootme
      description: Manage and query Root-Me tracked members
      usage_hint: "[help|ranking|profile|add|remove]"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - commands
      - chat:write

settings:
  event_subscriptions:
    bot_events: []
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
